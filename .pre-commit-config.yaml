# .pre-commit-config.yaml
# Pre-commit hooks for the TFG LLM Benchmarking project.
#
# Install pre-commit (one time):
#   pip install pre-commit
#   pre-commit install
#
# Run manually on all files:
#   pre-commit run --all-files

repos:
  # --- Python: Black formatter ---
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        files: ^backend/

  # --- Python: isort import sorter ---
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^backend/
        args: ["--profile", "black"]

  # --- Python: flake8 linter ---
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        files: ^backend/
        args:
          - "--max-line-length=88"
          - "--extend-ignore=E203,W503"
          - "--exclude=.venv-tfg-llm,alembic/versions"

  # --- General: trailing whitespace and end-of-file ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  # --- Frontend: ESLint via local hook ---
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        language: node
        entry: npx eslint
        args: ["--fix", "--max-warnings=0"]
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: true
