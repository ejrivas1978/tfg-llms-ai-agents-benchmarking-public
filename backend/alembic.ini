# alembic.ini
# Path: backend/alembic.ini
#
# Alembic configuration file.
# Run migrations from the backend/ directory:
#   alembic upgrade head
#   alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is intentionally left empty — it is set dynamically
# in alembic/env.py from app.core.config.get_settings().database_url
# so that credentials never live in this file.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
