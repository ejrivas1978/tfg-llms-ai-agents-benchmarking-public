<style>
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 520px;
    gap: 24px;
    background: transparent;
  }
  .sphere {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: #3a3a3a;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 6px 32px rgba(0,0,0,0.55), inset 0 -4px 14px rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
  }
  .bat-spin {
    animation: hover 2.4s ease-in-out infinite;
  }
  .bat-spin.spinning {
    animation: spin-once 0.7s ease-in-out forwards;
  }
  @keyframes hover {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-10px); }
  }
  @keyframes spin-once {
    0%   { transform: translateY(0px)   rotate(0deg); }
    40%  { transform: translateY(-10px) rotate(180deg); }
    100% { transform: translateY(0px)   rotate(360deg); }
  }
  .wing-left {
    animation: flapL 0.26s ease-in-out infinite alternate;
    transform-origin: 93% 45%;
  }
  .wing-right {
    animation: flapR 0.26s ease-in-out infinite alternate;
    transform-origin: 7% 45%;
  }
  @keyframes flapL {
    from { transform: rotate(0deg)   scaleY(1); }
    to   { transform: rotate(-20deg) scaleY(0.65); }
  }
  @keyframes flapR {
    from { transform: rotate(0deg)  scaleY(1); }
    to   { transform: rotate(20deg) scaleY(0.65); }
  }
  .spinning .wing-left,
  .spinning .wing-right { animation: none; }
  .eyes-blink {
    animation: blink-eyes 3.5s ease-in-out infinite;
  }
  @keyframes blink-eyes {
    0%,88%,100% { transform: scaleY(1); }
    93%         { transform: scaleY(0.05); }
  }

  .toast {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.65);
    color: #fff;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 20px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 10;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0px);
  }
  .model-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 300px;
  }
  .model-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #aaaaaa;
    transition: color 0.4s;
  }
  .model-row.done-row { color: #cccccc; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; transition: background 0.4s; }
  .dot.done    { background: #5aaa1a; }
  .dot.running { background: #f0a020; animation: pulse 1s ease-in-out infinite; }
  .dot.waiting { background: #555555; }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%     { opacity:0.4; transform:scale(0.65); }
  }
  .checkmark {
    margin-left: auto;
    color: #5aaa1a;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .checkmark.visible { opacity: 1; }
</style>

  <div class="model-list">
    <div class="model-row" id="row0"><div class="dot running" id="d0"></div><span id="l0">GPT-4o — respondiendo...</span><span class="checkmark" id="c0">✓</span></div>
    <div class="model-row" id="row1"><div class="dot waiting" id="d1"></div><span id="l1">Claude Sonnet — en cola</span><span class="checkmark" id="c1">✓</span></div>
    <div class="model-row" id="row2"><div class="dot waiting" id="d2"></div><span id="l2">Mistral Large — en cola</span><span class="checkmark" id="c2">✓</span></div>
    <div class="model-row" id="row3"><div class="dot waiting" id="d3"></div><span id="l3">Gemini Pro — en cola</span><span class="checkmark" id="c3">✓</span></div>
  </div>

<script>
  var models = ['GPT-4o', 'Claude Sonnet', 'Mistral Large', 'Gemini Pro'];
  var delays = [0, 2800, 5400, 8000];

  function spinAndComplete(idx) {
    var bat   = document.getElementById('batSpin');
    var wl    = document.getElementById('wl');
    var wr    = document.getElementById('wr');
    var toast = document.getElementById('toast');

    bat.classList.add('spinning');
    wl.style.animation = 'none';
    wr.style.animation = 'none';

    toast.textContent = models[idx] + ' completado ✓';
    toast.classList.add('show');

    setTimeout(function () {
      bat.classList.remove('spinning');
      wl.style.animation = '';
      wr.style.animation = '';
      toast.classList.remove('show');

      document.getElementById('d'   + idx).className = 'dot done';
      document.getElementById('l'   + idx).textContent = models[idx] + ' — completado';
      document.getElementById('c'   + idx).classList.add('visible');
      document.getElementById('row' + idx).classList.add('done-row');

      if (idx + 1 < models.length) {
        document.getElementById('d' + (idx + 1)).className = 'dot running';
        document.getElementById('l' + (idx + 1)).textContent = models[idx + 1] + ' — respondiendo...';
      }
    }, 900);
  }

  delays.forEach(function (delay, idx) {
    setTimeout(function () { spinAndComplete(idx); }, delay + 1800);
  });
</script>
